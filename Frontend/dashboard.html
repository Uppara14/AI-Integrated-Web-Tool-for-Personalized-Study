<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Personalized Study Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff416c, #ff4b2b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex;
    min-height: 100vh;
}

@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Sidebar */
.sidebar {
    width: 220px;
    background-color: #fff;
    border-radius: 0 20px 20px 0;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

.sidebar img { width: 100px; margin-bottom: 30px; }
.sidebar a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
    margin: 15px 0;
    display: flex;
    align-items: center;
    transition: 0.3s;
}
.sidebar a i { margin-right: 10px; }
.sidebar a:hover { color: #2575fc; }

/* Main content */
.main-content {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
}

.main-content h2 {
    color: #fff;
    margin-bottom: 10px;
    font-size: 28px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.card {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: #fff;
    padding: 30px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: all 0.4s ease;
    text-align: center;
}

.card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.card i {
    font-size: 40px;
    margin-bottom: 15px;
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

/* Responsive */
@media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; border-radius: 0 0 20px 20px; flex-direction: row; overflow-x: auto; padding: 10px; }
    .sidebar a { margin: 0 15px; }
    .main-content { padding: 20px; }
}
@media (max-width: 500px) {
    .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="sidebar">
    <img src="studyplanner.webp" alt="Logo" style="width: 100px; margin-bottom: 30px;">
    <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
    <a href="profile.html"><i class="fa fa-user"></i> Profile</a>
    <a href="upload.html"><i class="fa fa-upload"></i> Upload Syllabus</a>
    <a href="studyplan.html"><i class="fa fa-book"></i> Study Plan</a>
    <a href="quizzes.html"><i class="fa fa-question-circle"></i> Quizzes</a>
    <a href="progress.html"><i class="fa fa-chart-line"></i> Progress</a>
    <a href="index.html"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main-content">
    <h2>Welcome to Your Dashboard</h2>
    <p style="color: #fff; font-size:16px;">Quick access to your profile, syllabus, and study tools.</p>

    <div class="cards">
    <div class="card" onclick="window.location.href='studyplan.html'">
            <i class="fa fa-book"></i>
            <h3>Study Plan</h3>
        </div>
        <div class="card" onclick="window.location.href='upload.html'">
            <i class="fa fa-upload"></i>
            <h3>Upload Syllabus</h3>
        </div>
        <div class="card" onclick="window.location.href='quizzes.html'">
            <i class="fa fa-question-circle"></i>
            <h3>Take Quiz</h3>
        </div>
        <div class="card" onclick="window.location.href='progress.html'">
            <i class="fa fa-chart-line"></i>
            <h3>View Progress</h3>
        </div>
    </div>
</div>
<script src="script.js"></script>
<script>
// Dashboard specific functionality
document.addEventListener('DOMContentLoaded', function() {
    // Add welcome message with user's name if available
    const welcomeMessage = document.querySelector('.main-content h2');
    const userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
    if (userProfile.title) {
        welcomeMessage.textContent = `Welcome back, ${userProfile.title}!`;
    }
    // Add click handlers for better user experience
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-8px) scale(1.05)';
        });

        card.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0) scale(1)';
        });
    });

    // Load and display quick stats
    loadQuickStats();
});

// Function to load quick stats
function loadQuickStats() {
    const studyPlans = JSON.parse(localStorage.getItem('studyPlans') || '[]');
    const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
    // You can add stats display here if needed
    console.log('Study Plans:', studyPlans.length);
    console.log('Quizzes:', quizzes.length);
}
</script>
</body>
</html>
